services:

  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ecommerce

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ../schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - ecommerce-network


  product-service:
    image: ankit97leo/product-service:v1
    container_name: product-service

    restart: on-failure

    depends_on:
      - mysql

    ports:
      - "5000:5000"

    networks:
      - ecommerce-network


  order-service:
    image: ankit97leo/order-service:v1
    container_name: order-service

    restart: on-failure

    depends_on:
      - mysql

    ports:
      - "5001:5001"

    networks:
      - ecommerce-network


  inventory-service:
    image: ankit97leo/inventory-service:v1
    container_name: inventory-service

    restart: on-failure

    depends_on:
      - mysql

    ports:
      - "5002:5002"

    networks:
      - ecommerce-network


  frontend:
    image: ankit97leo/frontend:v1
    container_name: frontend

    depends_on:
      - product-service
      - order-service
      - inventory-service

    ports:
      - "3000:3000"

    networks:
      - ecommerce-network


volumes:
  mysql-data:


networks:
  ecommerce-network: